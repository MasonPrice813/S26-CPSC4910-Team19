<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Driver Incentive Program</title>

  <link rel="stylesheet" href="about-style.css" />
</head>

<body>
  <div class="navbar">
    <div>
      <strong>Good Driver Incentive Program</strong>
      <span class="muted" id="meBadge" style="margin-left: 10px;">Loading user...</span>
    </div>

    <div class="right">
      <button id="catalogBtn" class="btn btn-primary">Catalog</button>
    </div>
  </div>

  <main class="container">
    <section class="header">
      <h1 id="profileName">Loading...</h1>
      <p class="subtitle">Edit your Profile!</p>
    </section>
    
      <div class="content-box" style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <button id="saveProfileBtn" class="btn btn-primary">Save Profile</button>
        <span id="saveStatus" class="muted small"></span>
      </div>

    <section id="sections-container"></section>

    <section class="content-box">
      <button id="downloadCSV" class="btn btn-primary" type="button">Download CSV</button>
      <div class="info-row">
        <span class="label">Point History</span>
      </div>
      <div id="pointsHistory"></div>
    </section>
    
    <section class="content-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span class="label">Your Points Trends</span>
        
        <select id="myTimeView" class="input">
          <option value="week">Week</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
        </select>
      </div>
      <canvas id="myPointsChart" height="100"></canvas>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/Website/profile.js"></script>
</body>
</html>
