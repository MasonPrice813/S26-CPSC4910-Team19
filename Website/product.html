<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product</title>
<link rel="stylesheet" href="/Website/about-style.css" />

<style>

.star {
  font-size: 28px;
  cursor: pointer;
  color: #ccc;
}

.star.active {
  color: gold;
}

</style>

</head>

<body>

<div class="navbar">
  <strong>Product Details</strong>
  <button onclick="window.location.href='catalog.html'" class="btn btn-primary">
    Back to Catalog
  </button>
</div>

<main class="container">

<div id="productContainer"></div>

<h3>Leave a Review</h3>

<div class="content-box">

<label>Rating</label>

<div id="starRating">

<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>

</div>

<br>

<textarea id="reviewText" placeholder="Write your review..." style="width:100%; height:100px;"></textarea>

<br><br>

<button id="submitReview" class="btn btn-primary">
Submit Review
</button>

</div>

<h3>Reviews</h3>

<div id="reviews"></div>

</main>

<script src="/Website/product.js"></script>

</body>
</html>
