<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Logs — Driver Incentive Program</title>
  <link rel="stylesheet" href="/Website/about-style.css" />
  <style>
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; }
    .total-count { font-size: 13px; color: var(--muted); }

    /* ── Filter panel ── */
    .filter-section { margin-bottom: 14px; }

    .filter-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted-2);
      margin-bottom: 8px;
    }

    .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s, transform .1s;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover {
      background: rgba(255,255,255,.09);
      color: var(--text);
      transform: translateY(-1px);
    }
    .chip.active {
      background: linear-gradient(135deg, rgba(124,92,255,.28), rgba(61,214,255,.22));
      border-color: rgba(61,214,255,.4);
      color: #3dd6ff;
    }

    .date-range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .date-range-row span { font-size: 12px; color: var(--muted-2); }
    .date-range-row input[type="date"] { width: auto; padding: 7px 10px; font-size: 13px; }

    .search-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .search-actions input { flex: 1; min-width: 200px; font-size: 13px; }

    .filter-divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      font-size: 12px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      vertical-align: top;
      line-height: 1.45;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.03); }

    .user-name  { display: block; font-weight: 600; }
    .user-email { display: block; font-size: 12px; color: var(--muted); }

    /* ── Points spent ── */
    .points-spent {
      font-weight: 700;
      color: #ffc83c;
      white-space: nowrap;
    }
    .points-na { color: var(--muted-2); font-size: 12px; }

    /* ── Event badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .2px;
      white-space: nowrap;
    }
    .badge-login         { background: rgba(61,214,255,.15);  color: #3dd6ff; }
    .badge-login-failed  { background: rgba(255,80,80,.15);   color: #ff6b6b; }
    .badge-logout        { background: rgba(255,255,255,.08); color: var(--muted); }
    .badge-purchase      { background: rgba(80,255,160,.15);  color: #50ffa0; }
    .badge-application   { background: rgba(255,200,60,.15);  color: #ffc83c; }
    .badge-account       { background: rgba(124,92,255,.22);  color: #b99dff; }

    /* ── Status dot ── */
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-success::before { background: #50ffa0; }
    .status-failure::before { background: #ff6b6b; }
    .status-pending::before { background: #ffc83c; }

    /* ── States ── */
    .state-row td { text-align: center; padding: 40px; color: var(--muted); }
    .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,.12);
      border-top-color: var(--accent-2);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-text { color: #ff6b6b; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 16px;
      font-size: 13px;
    }
    #pageInfo { color: var(--muted); }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      td { padding: 6px 14px; }
      td[data-label]::before {
        content: attr(data-label);
        display: block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .5px;
        color: var(--muted-2);
        margin-bottom: 2px;
      }
      tbody tr { border-bottom: 1px solid var(--border); padding: 10px 0; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">Driver Incentive Program</div>
    <div class="nav-actions">
      <a href="/Website/dashboard.html" class="btn btn-secondary">← Dashboard</a>
    </div>
  </nav>

  <main class="container">

    <div class="page-header">
      <h1>Audit Logs</h1>
      <span class="total-count" id="totalCount">Loading…</span>
    </div>

    <!-- ── Filters ── -->
    <section class="content-box">

      <div class="filter-section">
        <div class="filter-label">Time Range</div>
        <div class="chip-row" id="chipRange">
          <button class="chip"        data-range="1d">Today</button>
          <button class="chip active" data-range="7d">Last 7 days</button>
          <button class="chip"        data-range="30d">Last 30 days</button>
          <button class="chip"        data-range="6m">Last 6 months</button>
          <button class="chip"        data-range="all">All time</button>
          <button class="chip"        data-range="custom">Custom…</button>
        </div>
        <div class="date-range-row" id="customDateRow" style="display:none;">
          <span>From</span>
          <input type="date" id="filterFrom" />
          <span>to</span>
          <input type="date" id="filterTo" />
        </div>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-section">
        <div class="filter-label">Sponsor</div>
        <div class="chip-row" id="chipSponsor">
          <button class="chip active" data-sponsor="">All sponsors</button>
          <!-- injected from /api/admin/audit-logs/sponsors -->
        </div>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-section">
        <div class="filter-label">Event Type</div>
        <div class="chip-row" id="chipEvent">
          <button class="chip active"  data-event="">All</button>
          <button class="chip" data-event="login">Login</button>
          <button class="chip" data-event="login_failed">Login Failed</button>
          <button class="chip" data-event="logout">Logout</button>
          <button class="chip" data-event="purchase">Purchase</button>
          <button class="chip" data-event="driver_application">Application</button>
          <button class="chip" data-event="account_created">Account Created</button>
        </div>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-section">
        <div class="filter-label">Status</div>
        <div class="chip-row" id="chipStatus">
          <button class="chip active" data-status="">All</button>
          <button class="chip" data-status="success">Success</button>
          <button class="chip" data-status="failure">Failure</button>
          <button class="chip" data-status="pending">Pending</button>
        </div>
      </div>

      <div class="search-actions">
        <input type="text" id="filterSearch" placeholder="Search by description or email…" />
        <button id="btnApply" class="btn btn-primary">Apply</button>
        <button id="btnReset" class="btn btn-secondary">Reset</button>
      </div>

    </section>

    <!-- ── Table ── -->
    <section class="content-box" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Event</th>
              <th>User</th>
              <th>Sponsor</th>
              <th>Description</th>
              <th>Points Spent</th>
              <th>Status</th>
              <th>IP Address</th>
            </tr>
          </thead>
          <tbody id="logTableBody">
            <tr id="loadingState" class="state-row">
              <td colspan="8">
                <div class="spinner"></div>
                <p>Loading audit logs…</p>
              </td>
            </tr>
            <tr id="emptyState" class="state-row" hidden>
              <td colspan="8">No events match your filters.</td>
            </tr>
            <tr id="errorState" class="state-row" hidden>
              <td colspan="8">
                <p class="error-text">Failed to load logs: <span id="errorMsg"></span></p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ── Pagination ── -->
    <div class="pagination" id="pagination" hidden>
      <button id="btnPrev" class="btn btn-secondary" disabled>← Prev</button>
      <span id="pageInfo"></span>
      <button id="btnNext" class="btn btn-secondary">Next →</button>
    </div>

    <footer class="footer">
      <p>&copy; 2026 — Driver Incentive Program</p>
    </footer>

  </main>

  <script src="/Website/audit-logs.js"></script>
</body>
</html>
